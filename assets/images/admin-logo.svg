<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgGradient)" rx="40"/>
  
  <!-- Lightning bolt icon (representing speed/performance) -->
  <g filter="url(#shadow)">
    <path d="M220 80 L140 220 L190 220 L170 320 L260 180 L210 180 Z" 
          fill="white" 
          stroke="white" 
          stroke-width="4"
          stroke-linejoin="round"/>
  </g>
  
  <!-- Text "UXNitro" at bottom -->
  <text x="200" 
        y="370" 
        font-family="Arial, sans-serif" 
        font-size="36" 
        font-weight="bold" 
        fill="white" 
        text-anchor="middle" 
        letter-spacing="2">UXNitro</text>
</svg>
